name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch: # ช่วยให้คุณพี่กดสั่งบิลด์แอปเองได้จากหน้าเว็บ GitHub

jobs:
  build:
    runs-on: macos-14 # รันบนเครื่อง Mac บนคลาวด์ของ GitHub
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          npm install
          npx cap ios

      - name: Build Web Code and Sync
        run: |
          npx cap sync ios

      - name: Compile iOS Project to .app
        run: |
          # บิลด์แอปแบบไม่ใช้ใบรับรอง Apple Developer
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     CONFIGURATION_BUILD_DIR=build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     clean build

      - name: Package .app into .ipa (The Sideload Hack)
        run: |
          # สร้างโฟลเดอร์ Payload และนำแอปไปแพ็กเป็น .ipa
          mkdir Payload
          cp -r ios/App/build/App.app Payload/
          zip -r SmartAcc.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v3
        with:
          name: SmartAcc-SideStore-IPA
          path: SmartAcc.ipa
